apiVersion: apps/v1
kind: Deployment
metadata:
  name: codebridge-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codebridge-api
  template:
    metadata:
      labels:
        app: codebridge-api
    spec:
      containers:
        - name: api
          image: codebridge:latest
          env:
            - name: ROLE
              value: api
            - name: PORT
              value: "8788"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: codebridge-secrets
                  key: database_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: codebridge-secrets
                  key: redis_url
            - name: CONFIG_PATH
              value: /app/config/tenants.yaml
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codebridge-secrets
                  key: slack_bot_token
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codebridge-secrets
                  key: slack_app_token
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: codebridge-secrets
                  key: slack_signing_secret
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: codebridge-secrets
                  key: github_app_id
            - name: GITHUB_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: codebridge-secrets
                  key: github_private_key
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: codebridge-secrets
                  key: github_webhook_secret
          ports:
            - containerPort: 8788
---
apiVersion: v1
kind: Service
metadata:
  name: codebridge-api
spec:
  selector:
    app: codebridge-api
  ports:
    - port: 8788
      targetPort: 8788
