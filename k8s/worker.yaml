apiVersion: apps/v1
kind: Deployment
metadata:
  name: codebridge-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codebridge-worker
  template:
    metadata:
      labels:
        app: codebridge-worker
    spec:
      containers:
        - name: worker
          image: codebridge:latest
          env:
            - name: ROLE
              value: worker
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: codebridge-secrets
                  key: database_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: codebridge-secrets
                  key: redis_url
            - name: CONFIG_PATH
              value: /app/config/tenants.yaml
            - name: CODEX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codebridge-secrets
                  key: codex_api_key
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: codebridge-secrets
                  key: github_app_id
            - name: GITHUB_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: codebridge-secrets
                  key: github_private_key
