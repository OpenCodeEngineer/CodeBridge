# Example values only. Do not commit real secrets to repository config.
# Prefer putting real values in ~/.config/codebridge/config.yaml.
secrets:
  githubApps:
    codex:
      appId: 123456
      privateKey: "BASE64_OR_PEM_PRIVATE_KEY_FOR_CODEX_APP"
      webhookSecret: "optional-webhook-secret-for-codex"
      commandPrefixes:
        - "CodexApp"
    opencode:
      appId: 234567
      privateKey: "BASE64_OR_PEM_PRIVATE_KEY_FOR_OPENCODE_APP"
      webhookSecret: "optional-webhook-secret-for-opencode"
      commandPrefixes:
        - "OpenCodeApp"
  # codexNotifyToken: "optional-notify-token"
  # vibeAgentsToken: "optional-vibe-agents-token"
  # opencodePassword: "optional-opencode-password"

integrations:
  # Optional external sink for agent session dashboards.
  vibeAgents:
    endpoint: "https://api.vibebrowser.app/api/agents/sessions"
    # token: "optional-token-if-not-using-secrets.vibeAgentsToken"
    author: "dzianisv"
    project: "VibeWebAgent"
    enabled: true
    timeoutMs: 8000
  opencode:
    baseUrl: "http://127.0.0.1:4096"
    username: "opencode"
    # password: "optional-inline-password"
    enabled: true
    timeoutMs: 300000
    pollIntervalMs: 2000

tenants:
  - id: local
    name: Local
    slack:
      teamId: "T123456"
      commandPrefixes:
        - "codex:"
        - "/codex"
        - "@codex"
    github:
      apps:
        - appKey: "codex"
          installationId: 123456
          repoAllowlist:
            - "owner/repo"
          # Optional: assignment bootstrap handles.
          # Use assignable GitHub users; app bot logins may not be assignable in all repos.
          # assignmentAssignees:
          #   - "openai-code-agent"
        - appKey: "opencode"
          installationId: 234567
          repoAllowlist:
            - "owner/repo"
    repos:
      - fullName: "owner/repo"
        path: "/Users/engineer/workspace/opencode-manager"
        backend: "codex"                # default backend when app-specific override is absent
        model: "gpt-5.2-codex"
        githubApps:
          opencode:
            backend: "opencode"
            agent: "build"              # backend-specific; currently used by OpenCode
            model: "openai/gpt-5"       # OpenCode expects provider/model
            branchPrefix: "opencode"
        baseBranch: "main"
        branchPrefix: "codex"
    defaultRepo: "owner/repo"
